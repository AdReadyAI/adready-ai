# AdReady Score Engine Config v0.2
# Companion to score_engine_proposal_v0.2.md — do not overwrite v0.1 config

version: "0.2"

weights:
  brief_adherence: 20
  product_truth: 20
  product_clarity: 15
  audience_fit: 10
  brand_fit: 10
  cta_clarity: 10
  channel_readiness: 10
  creative_effectiveness: 5
  production_readiness: 0   # Visual dimension score + gating; not in Ad Ready %
  policy_compliance: 0      # gating only

severity_deductions:
  none: 0
  low: 5
  medium: 20
  high: 40
  critical: 100

thresholds:
  ready_min: 85              # same as v0.1
  needs_revision_min: 65     # same as v0.1

gating_rules:
  - metric_id: production_readiness
    min_severity: high
    label: Asset Readiness
  - metric_id: policy_compliance
    min_severity: high
    label: Compliance Readiness

scored_high_critical_is_gating: false

display_dimensions:
  claims_accuracy:
    metrics: [product_truth]
  product_representation:
    metrics: [product_clarity]
  storyline_brief:
    metrics: [brief_adherence, creative_effectiveness, channel_readiness]
  cta_effectiveness:
    metrics: [cta_clarity]
  brand_alignment:
    metrics: [brand_fit, audience_fit]
  visual_asset_quality:
    metrics: [production_readiness]   # metric_score for UI; weight 0 in Ad Ready %
    also_gating: true

dimension_merge: weight_aware_average

priority_fix_sort:
  - gating_first
  - severity_desc
  - weight_desc

gating_sort_effective_weight: 100
