services:
  worker:
    build: ./worker
    env_file:
      - ./worker/.env
    # deploy:
    #   replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c 'import os,psycopg2; psycopg2.connect(os.environ[\"DATABASE_URL\"]).close()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s