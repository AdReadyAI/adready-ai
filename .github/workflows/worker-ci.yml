name: Worker CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
      - "docker-compose.yml"
      - ".github/workflows/worker-ci.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "docker-compose.yml"
      - ".github/workflows/worker-ci.yml"

permissions:
  contents: read

concurrency:
  group: worker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Install locked dependencies
        run: uv sync --locked

      # Compile every module so syntax errors fail before the container is deployed.
      - name: Compile Python sources
        run: uv run python -m py_compile *.py

  unit-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Run unit tests
        run: uv run pytest -m unit

  integration-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: worker/uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1
        with:
          version: 2.109.1 # Took the latest one as of 14/7/2026

      # Build the real local queue contract before exercising the worker's database boundary.
      - name: Start and reset local database
        working-directory: .
        run: |
          supabase db start
          supabase db reset --local --no-seed

      - name: Run integration tests
        run: uv run pytest -m integration
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Stop local Supabase services
        if: always()
        working-directory: .
        run: supabase stop --no-backup

  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Building the production image validates the same Dockerfile Railway will use.
      - name: Build worker image
        run: docker build --tag adready-worker:ci worker

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [quality, unit-tests, integration-tests, container]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    concurrency:
      group: railway-worker-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node for Railway CLI
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Railway CLI
        run: npm install --global @railway/cli@5.26.0

      # The project token is scoped to one Railway project and environment.
      - name: Deploy media worker
        run: railway up worker --path-as-root --service "${{ vars.RAILWAY_SERVICE }}" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
